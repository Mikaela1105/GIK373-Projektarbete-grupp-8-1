<head>
    <meta charset="UTF-8">

    <title>Världens vatten - Statistik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar section-content">
            <a href="index.html" class="nav-logo">
                <img src="img/logotype.png" alt="logotype" class="logotype">
            </a>
            <ul class="nav-menu">
                <button id="menu-close-button" class="fas fa-times"></button>
                <li class="nav-item">
                    <a href="index.html" class="nav-link" onclick="openPanel('#')">Hem</a>
                </li>
                <li class="nav-item">
                    <a href="about.html" class="nav-link" onclick="openPanel('about')">Om oss</a>
                </li>
                <li class="nav-item">
                    <a href="facts.html" class="nav-link" onclick="openPanel('facts')">Fakta</a>
                </li>
                <li class="nav-item">
                    <a href="statistics.html" class="nav-link active" onclick="openPanel('statistics')">Statistik</a>
                </li>
                <li class="nav-item">
                    <a href="resources.html" class="nav-link" onclick="openPanel('resources')">Kontakter</a>
                </li>
            </ul>
            <button id="menu-open-button" class="fas fa-bars"></button>
        </nav>
    </header>

    <main>
        <section class="home-stat">
            <img src="shutterstock_1437067514-1-1000x490.jpg" class="home-imagestat" alt="home-stat">
        </section>
        <section class="about-section" style="padding: 140px 0 60px 0;">
            <div class="section-content" style="max-width: var(--site-max-width); margin: 0 auto; display: block;">
                <h2 class="section-title">Statistik och Dataanalys</h2>
                
                <div style="margin-bottom: 60px; background: var(--white-color); padding: 30px; border-radius: var(--border-radius-s); box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                    <h3 style="margin-bottom: 20px; color: var(--dark-color); font-size: var(--font-size-m); font-weight: var(--font-weight-semibold);">
                        <i class="fa-solid fa-earth-americas" style="color: var(--secondary-color); margin-right: 10px;"></i>
                        Världskarta: Global tillgång till rent vatten År 2021 (%)
                    </h3>
                    <div style="max-width: 900px; margin: 0 auto;">
                        <canvas id="owidMap"></canvas>
                    </div>
                </div>

                <div style="margin-bottom: 60px; background: var(--white-color); padding: 30px; border-radius: var(--border-radius-s); box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                    <h3 style="margin-bottom: 20px; color: var(--dark-color); font-size: var(--font-size-m); font-weight: var(--font-weight-semibold);">
                        <i class="fa-solid fa-chart-scatter" style="color: var(--secondary-color); margin-right: 10px;"></i>
                        Scatterplot: BNP vs Tillgång till rent vatten (2024)
                    </h3>
                    <canvas id="owid1"></canvas>
                </div>

                <div style="margin-bottom: 20px; background: var(--white-color); padding: 30px; border-radius: var(--border-radius-s); box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                    <h3 style="margin-bottom: 20px; color: var(--dark-color); font-size: var(--font-size-m); font-weight: var(--font-weight-semibold);">
                        <i class="fa-solid fa-chart-line" style="color: var(--secondary-color); margin-right: 10px;"></i>
                        Linjediagram: Eritreas historiska utveckling
                    </h3>
                    <canvas id="owid2"></canvas>
                </div>
            </div>
        </section>

        <footer class="footer-section">
            <div class="section-content">
                <p class="copyright-text">© 2026 Water & Sanitation</p>
                <div class="social-link-list">
                    <a href="#" class="social-link"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-x-twitter"></i></a>
                </div>
                <p class="policy-text">
                    <a href="#" class="policy-link">Privacy policy</a>
                    <span class="seperator">.</span>
                    <a href="#" class="policy-link">Refund policy</a>
                </p>
            </div>
        </footer>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/chartjs-chart-geo@4.3.4/build/index.umd.min.js"></script>
    <script>
        // Registrerar kartkomponenter innan script.js körs
        Chart.register(ChartGeo.ChoroplethController, ChartGeo.GeoFeature, ChartGeo.ColorScale, ChartGeo.ProjectionScale);
    </script>
    <script src="script.js"></script>
</body>
</html>
